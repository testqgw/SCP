name: Universal Model Retrain

on:
  schedule:
    - cron: "45 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Retrain live universal model
        run: npm run projection:retrain:universal-live

      - name: Commit updated live artifacts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports
          if git diff --cached --quiet; then
            echo "No universal artifact changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh universal live model artifacts"
          git push
