name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
